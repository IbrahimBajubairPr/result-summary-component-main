<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <title>Frontend Mentor | Results summary component</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="product">
    <div class="product-left">
      <p class="result">your result</p>
      <div class="num-of-result">

        <p><span>76</span>of 100</p>
      </div>
      <h2>great</h2>
      <p>You scored higher than 65% of the people who have taken these tests.</p>
    </div>
    <div class="product-right">
      <h3>Summary</h3>
      <div class="category one">
        <div class="reaction">
          <img src="assets/images/icon-reaction.svg" alt="icon-reaction">
          <p>Reaction</p>
        </div>
        <p>
          <span>80</span> / 100
        </p>
      </div>
      <div class="category two">
        <div class="Memory">
          <img src="assets/images/icon-memory.svg" alt="icon-Memory">
          <p>Memory</p>
        </div>
        <p>
          <span>92</span> / 100
        </p>
      </div>
      <div class="category three ">
        <div class="Verbal">
          <img src="assets/images/icon-Verbal.svg" alt="icon-Verbal">
          <p>Verbal</p>
        </div>
        <p>
          <span>61</span> / 100
        </p>
      </div>
      <div class="category four">
        <div class="Visual">
          <img src="assets/images/icon-Visual.svg" alt="icon-Visual">
          <p>Visual</p>
        </div>
        <p>
          <span>72</span> / 100
        </p>
      </div>
      <button>Continue</button>
    </div>
  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="https://github.com/IbrahimBajubairPr">Ibrahim Zuhair Ba_jubair</a>.
  </footer>
</body>

</html>
